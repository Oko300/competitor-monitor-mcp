# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "Competitor Monitor"
slug: "competitor-monitor"

runtime: python
entry: "server.py"

build:
  install: "pip install -r requirements.txt"

start:
  type: stdio
  command: "python"
  args:
    - "-m"
    - "server"

bridge:
  mode: stdio
